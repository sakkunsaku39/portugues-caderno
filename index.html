<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Caderno PT">
<meta name="theme-color" content="#f5efe4">
<title>Caderno · Português Europeu</title>
<style>
  /* ---------- Fonts ---------- */
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap');

  /* ---------- Tokens ---------- */
  :root {
    --paper: #f5efe4;
    --paper-deep: #ede5d3;
    --ink: #1a1814;
    --ink-soft: #4a443a;
    --ink-fade: #7a7264;
    --rule: #d4c9b0;
    --rule-soft: #e3d9c2;
    --azulejo: #2c5f7c;
    --azulejo-deep: #1e4257;
    --terracotta: #b8593a;
    --gold: #a87c2c;
    --highlight: #f4e4a1;
    --warning-bg: #f7e4dc;
    --warning-border: #b8593a;
    --good-bg: #e0e8d8;
    --good-border: #5a7a3a;

    --serif-display: 'Fraunces', 'Noto Serif JP', serif;
    --serif-body: 'Cormorant Garamond', 'Noto Serif JP', serif;
    --jp: 'Noto Serif JP', serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: var(--serif-body);
    font-size: 19px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(168, 124, 44, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(44, 95, 124, 0.04) 0%, transparent 40%);
    min-height: 100vh;
    padding-bottom: 80px;
    /* paper texture */
    background-attachment: fixed;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.5;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.35 0 0 0 0 0.25 0 0 0 0.05 0'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
  }

  /* ---------- Layout ---------- */
  .shell {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ---------- Masthead ---------- */
  header.masthead {
    padding: 56px 0 28px;
    text-align: center;
    border-bottom: 1px double var(--rule);
    margin-bottom: 32px;
  }
  .masthead .eyebrow {
    font-family: var(--serif-display);
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-fade);
    margin-bottom: 14px;
  }
  .masthead h1 {
    font-family: var(--serif-display);
    font-weight: 500;
    font-size: clamp(32px, 8vw, 44px);
    letter-spacing: -0.01em;
    line-height: 1.05;
    font-variation-settings: "opsz" 144, "SOFT" 30;
  }
  .masthead h1 em {
    font-style: italic;
    color: var(--azulejo);
    font-weight: 400;
  }
  .masthead .sub {
    font-family: var(--jp);
    font-size: 13px;
    color: var(--ink-fade);
    margin-top: 14px;
    letter-spacing: 0.05em;
  }

  /* ---------- Search ---------- */
  .search-wrap {
    margin-bottom: 28px;
    position: sticky;
    top: 0;
    background: var(--paper);
    padding: 12px 0;
    z-index: 10;
    border-bottom: 1px solid var(--rule-soft);
  }
  .search-input {
    width: 100%;
    padding: 12px 16px 12px 42px;
    font-family: var(--serif-body);
    font-size: 17px;
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus {
    border-color: var(--azulejo);
  }
  .search-input::placeholder {
    color: var(--ink-fade);
    font-style: italic;
  }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-fade);
    font-size: 18px;
    pointer-events: none;
  }

  /* ---------- Tag Index (home) ---------- */
  .tag-index {
    margin-bottom: 48px;
  }
  .index-title {
    font-family: var(--serif-display);
    font-size: 13px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-fade);
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .tag-list {
    list-style: none;
    counter-reset: tag-counter;
  }
  .tag-list li {
    counter-increment: tag-counter;
    border-bottom: 1px dotted var(--rule);
    padding: 18px 0;
    cursor: pointer;
    transition: padding-left 0.25s ease, background 0.2s;
    position: relative;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .tag-list li:hover {
    padding-left: 8px;
    background: linear-gradient(to right, rgba(168, 124, 44, 0.06), transparent 60%);
  }
  .tag-list li::before {
    content: counter(tag-counter, decimal-leading-zero);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-fade);
    flex-shrink: 0;
    width: 28px;
    padding-top: 4px;
  }
  .tag-list .tag-content {
    flex: 1;
  }
  .tag-list .tag-name {
    font-family: var(--serif-display);
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 4px;
    font-variation-settings: "opsz" 60;
  }
  .tag-list .tag-pattern {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--azulejo);
    margin-bottom: 6px;
    word-break: break-word;
  }
  .tag-list .tag-theme {
    font-family: var(--jp);
    font-size: 13px;
    color: var(--ink-soft);
  }
  .tag-list .tag-arrow {
    color: var(--ink-fade);
    font-family: var(--serif-body);
    font-size: 24px;
    align-self: center;
    transition: transform 0.25s;
  }
  .tag-list li:hover .tag-arrow {
    transform: translateX(4px);
    color: var(--azulejo);
  }
  .tag-list .has-note-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--terracotta);
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ---------- Note view ---------- */
  .note-view { display: none; }
  .note-view.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .back-link {
    font-family: var(--serif-display);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-fade);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 0;
    margin-bottom: 24px;
    font-style: italic;
  }
  .back-link:hover { color: var(--azulejo); }

  .note-view h1 {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-fade);
    font-weight: 400;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  .note-view h2 {
    font-family: var(--serif-display);
    font-size: clamp(26px, 6vw, 34px);
    font-weight: 500;
    line-height: 1.15;
    margin: 8px 0 24px;
    font-variation-settings: "opsz" 100;
    color: var(--ink);
  }
  .note-view h2 em {
    font-style: italic;
    color: var(--azulejo);
    font-weight: 400;
  }

  .note-view h3 {
    font-family: var(--serif-display);
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin: 40px 0 16px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--rule);
    font-weight: 600;
  }

  .note-view h4 {
    font-family: var(--serif-display);
    font-size: 18px;
    font-weight: 600;
    margin: 28px 0 12px;
    color: var(--ink);
    font-variation-settings: "opsz" 50;
  }
  .note-view h4 .num {
    color: var(--gold);
    font-family: var(--mono);
    font-size: 13px;
    margin-right: 8px;
    font-weight: 400;
  }

  .note-view p {
    font-family: var(--jp);
    font-size: 15px;
    line-height: 1.85;
    margin-bottom: 14px;
    color: var(--ink-soft);
  }
  .note-view p.lead {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 19px;
    color: var(--azulejo-deep);
    padding: 16px 0 16px 20px;
    border-left: 3px solid var(--azulejo);
    background: linear-gradient(to right, rgba(44, 95, 124, 0.04), transparent);
    margin: 16px 0 24px;
  }

  /* portuguese sentence */
  .pt {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 18px;
    color: var(--ink);
    font-weight: 500;
  }
  .pt strong {
    background: linear-gradient(to bottom, transparent 60%, var(--highlight) 60%);
    font-weight: 600;
    font-style: italic;
  }

  /* example block */
  .example {
    margin: 12px 0 16px;
    padding: 14px 18px;
    border-left: 2px solid var(--rule);
    background: rgba(237, 229, 211, 0.4);
  }
  .example .pt-line { font-family: var(--serif-body); font-style: italic; font-size: 18px; line-height: 1.4; }
  .example .pt-line strong {
    background: linear-gradient(to bottom, transparent 60%, var(--highlight) 60%);
    font-weight: 600;
  }
  .example .jp-line {
    font-family: var(--jp); font-size: 13px; color: var(--ink-soft);
    margin-top: 4px;
  }
  .example .source {
    font-family: var(--serif-display); font-style: italic; font-size: 11px;
    color: var(--ink-fade); margin-top: 6px;
    letter-spacing: 0.04em;
  }

  /* tables */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0 24px;
    font-size: 14px;
  }
  th, td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--rule-soft);
    vertical-align: top;
  }
  th {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-fade);
    border-bottom: 1.5px solid var(--rule);
  }
  td.pt-cell {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 16px;
    color: var(--ink);
  }
  td.jp-cell {
    font-family: var(--jp);
    font-size: 13px;
    color: var(--ink-soft);
  }
  td .hl {
    background: linear-gradient(to bottom, transparent 60%, var(--highlight) 60%);
    font-weight: 600;
  }
  table.conj {
    max-width: 360px;
  }
  table.conj td:first-child {
    font-family: var(--jp);
    color: var(--ink-fade);
    font-size: 13px;
    width: 35%;
  }
  table.conj td:last-child {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 17px;
    font-weight: 500;
  }
  table.conj td:last-child strong {
    background: linear-gradient(to bottom, transparent 60%, var(--highlight) 60%);
  }

  /* callouts */
  .callout {
    margin: 18px 0;
    padding: 14px 18px;
    border-radius: 2px;
    font-family: var(--jp);
    font-size: 14px;
    line-height: 1.7;
    position: relative;
  }
  .callout.warning {
    background: var(--warning-bg);
    border-left: 3px solid var(--warning-border);
    color: #5a2a1a;
  }
  .callout.tip {
    background: var(--good-bg);
    border-left: 3px solid var(--good-border);
    color: #2a3a1a;
  }
  .callout::before {
    font-family: var(--serif-display);
    font-style: italic;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
    opacity: 0.7;
  }
  .callout.warning::before { content: '⚠ Atenção'; color: var(--warning-border); }
  .callout.tip::before { content: '✦ Dica'; color: var(--good-border); }

  .callout .pt-inline { font-family: var(--serif-body); font-style: italic; font-size: 15px; color: var(--ink); }
  .callout .x { color: #a83a2a; font-weight: 600; }
  .callout .ok { color: #4a7a3a; font-weight: 600; }

  /* Mistake list */
  .mistake-row {
    padding: 12px 0;
    border-bottom: 1px dotted var(--rule);
    font-size: 14px;
  }
  .mistake-row:last-child { border: none; }
  .mistake-row .wrong, .mistake-row .right {
    font-family: var(--serif-body); font-style: italic; font-size: 16px;
    display: block; margin: 3px 0;
  }
  .mistake-row .wrong::before { content: '× '; color: #a83a2a; font-weight: 700; font-style: normal; }
  .mistake-row .right::before { content: '○ '; color: #4a7a3a; font-weight: 700; font-style: normal; }
  .mistake-row .reason {
    font-family: var(--jp); font-size: 12px; color: var(--ink-fade); margin-top: 4px;
    padding-left: 18px;
  }

  /* related tags */
  .related-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .related-tag {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--paper-deep);
    color: var(--azulejo);
    padding: 6px 10px;
    border: 1px solid var(--rule);
    cursor: pointer;
    transition: all 0.2s;
  }
  .related-tag:hover {
    background: var(--azulejo);
    color: var(--paper);
    border-color: var(--azulejo);
  }
  .related-tag.future {
    color: var(--ink-fade);
    cursor: default;
    font-style: italic;
  }
  .related-tag.future:hover {
    background: var(--paper-deep);
    color: var(--ink-fade);
    border-color: var(--rule);
  }

  /* Personal notes */
  .notes-area {
    margin-top: 16px;
  }
  .notes-textarea {
    width: 100%;
    min-height: 140px;
    padding: 16px;
    font-family: var(--jp);
    font-size: 15px;
    line-height: 1.7;
    background: var(--paper-deep);
    border: 1px dashed var(--rule);
    border-radius: 2px;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .notes-textarea:focus {
    border-style: solid;
    border-color: var(--terracotta);
  }
  .notes-meta {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 11px;
    color: var(--ink-fade);
    margin-top: 6px;
    text-align: right;
    letter-spacing: 0.05em;
  }
  .notes-meta .saved-flash {
    color: var(--good-border);
    transition: opacity 0.4s;
  }

  /* Footer */
  footer {
    margin-top: 80px;
    padding: 32px 0;
    border-top: 1px double var(--rule);
    text-align: center;
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-fade);
    letter-spacing: 0.06em;
  }
  footer .ornament {
    font-size: 18px;
    color: var(--gold);
    margin-bottom: 14px;
    letter-spacing: 0.4em;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    font-family: var(--jp);
    color: var(--ink-fade);
    font-size: 14px;
  }
  .no-results::before {
    content: '∅';
    display: block;
    font-size: 36px;
    color: var(--rule);
    margin-bottom: 12px;
  }

  /* Search highlight */
  mark {
    background: var(--highlight);
    color: var(--ink);
    padding: 0 2px;
  }

  /* Mobile */
  @media (max-width: 480px) {
    body { font-size: 17px; }
    .shell { padding: 0 18px; }
    header.masthead { padding: 36px 0 22px; }
    .tag-list .tag-name { font-size: 19px; }
    .tag-list .tag-pattern { font-size: 11px; }
    table { font-size: 13px; }
    th, td { padding: 8px 8px; }
    td.pt-cell { font-size: 15px; }
  }

  /* Selection */
  ::selection { background: var(--azulejo); color: var(--paper); }

  /* ============== FSRS / Study UI ============== */
  nav.tabs {
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 20;
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 0;
    padding-top: 8px;
  }
  nav.tabs button {
    flex: 1;
    background: none;
    border: none;
    padding: 14px 4px;
    font-family: var(--serif-display);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-fade);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  nav.tabs button.active {
    color: var(--ink);
    border-bottom-color: var(--terracotta);
  }
  nav.tabs button:hover { color: var(--ink-soft); }
  nav.tabs button .badge {
    display: inline-block;
    background: var(--terracotta);
    color: var(--paper);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 4px;
    font-family: var(--mono);
    letter-spacing: 0;
    vertical-align: 1px;
    min-width: 18px;
    text-align: center;
  }
  nav.tabs button.active .badge { background: var(--azulejo); }

  .page { display: none; }
  .page.active { display: block; }

  .tag-list .tag-meta {
    display: flex;
    gap: 12px;
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-fade);
    letter-spacing: 0.04em;
    flex-wrap: wrap;
  }
  .tag-list .tag-meta .due-now {
    color: var(--terracotta);
    font-weight: 500;
  }
  .tag-list .tag-meta .has-note { color: var(--gold); }

  .study-launch {
    display: flex;
    gap: 8px;
    margin: 16px 0 36px;
    flex-wrap: wrap;
  }
  .study-btn {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 13px;
    padding: 10px 18px;
    background: var(--azulejo);
    color: var(--paper);
    border: none;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s;
  }
  .study-btn:hover { background: var(--azulejo-deep); }
  .study-btn:disabled,
  .study-btn.disabled {
    background: var(--rule);
    color: var(--ink-fade);
    cursor: default;
  }
  .study-btn .count {
    font-family: var(--mono);
    font-size: 11px;
    margin-left: 6px;
    background: rgba(255,255,255,0.2);
    padding: 1px 6px;
    border-radius: 10px;
  }

  .study-tag-card {
    padding: 16px 0;
    border-bottom: 1px dotted var(--rule);
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .study-tag-card .stc-info { flex: 1; min-width: 0; }
  .study-tag-card .stc-name {
    font-family: var(--serif-display);
    font-size: 17px;
    color: var(--ink);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .study-tag-card .stc-stats {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-fade);
    letter-spacing: 0.04em;
  }
  .study-tag-card .stc-stats .due { color: var(--terracotta); font-weight: 500; }
  .study-tag-card .stc-stats .new { color: var(--azulejo); }
  .study-tag-card .stc-stats .learned { color: var(--good-border); }
  .study-tag-card .stc-btn {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 12px;
    padding: 8px 14px;
    background: var(--paper-deep);
    color: var(--ink);
    border: 1px solid var(--rule);
    cursor: pointer;
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }
  .study-tag-card .stc-btn:hover {
    background: var(--azulejo);
    color: var(--paper);
    border-color: var(--azulejo);
  }
  .study-tag-card .stc-btn:disabled {
    background: var(--paper-deep);
    color: var(--ink-fade);
    border-color: var(--rule);
    cursor: default;
  }

  /* Learned tag toggle */
  .learned-toggle {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border: 1.5px solid var(--rule);
    background: transparent;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .learned-toggle .learned-check {
    font-size: 14px;
    color: transparent;
    line-height: 1;
    transition: color 0.18s;

<script>
/* ============================================================
   DATA — All grammar notes embedded
   ============================================================ */
const NOTES = [
  {
    id: 'ir_a_lugar_com_objeto',
    name: 'ir a + lugar + com + objeto',
    pattern: 'ir a + [lugar] + com + [objeto]',
    theme: '移動動詞・縮約 ao/à',
    source: 'O menino e o pato',
    sections: [
      { type: 'lead', text: '「[誰々]が[何々]を持って[どこそこ]へ行く」' },
      { type: 'h3', text: '例文' },
      { type: 'example', pt: 'Um menino vai <strong>ao</strong> parque <strong>com</strong> um pão.', jp: '男の子がパンを持って公園へ行く。', source: 'Shorty「O menino e o pato」' },
      { type: 'example', pt: 'Vou <strong>à</strong> farmácia <strong>com</strong> a receita.', jp: '処方箋を持って薬局に行く。' },
      { type: 'example', pt: 'Nós vamos <strong>à</strong> praia <strong>com</strong> uma toalha.', jp: '私たちはタオルを持ってビーチへ行く。' },

      { type: 'h3', text: 'ポイント解説' },
      { type: 'h4', num: '1', text: 'ir a vs ir para' },
      { type: 'p', text: '<b>ir a</b> … 短期的な訪問・往復を前提（その場所に行ってまた戻る）<br><span class="pt">Vou ao supermercado.</span>（スーパーに行く＝買い物してすぐ戻る）' },
      { type: 'p', text: '<b>ir para</b> … より長期的・恒久的な移動<br><span class="pt">Vou para casa.</span>（家に帰る＝そこに留まる）<br><span class="pt">Vou para o Brasil no próximo ano.</span>（来年ブラジルに引っ越す）' },
      { type: 'tip', text: 'A1-A2では「日常的な外出」はほぼすべて <span class="pt-inline">ir a</span> で表現できると覚えてOK。' },

      { type: 'h4', num: '2', text: '縮約 (contração) の必須対応表' },
      { type: 'table', headers: ['前置詞 + 冠詞', '縮約形', '例'], rows: [
        ['a + o', '<span class="hl">ao</span>', 'ir <span class="hl">ao</span> parque'],
        ['a + a', '<span class="hl">à</span>', 'ir <span class="hl">à</span> escola'],
        ['a + os', '<span class="hl">aos</span>', 'ir <span class="hl">aos</span> correios'],
        ['a + as', '<span class="hl">às</span>', 'ir <span class="hl">às</span> compras'],
      ]},
      { type: 'warning', text: '<b>a + a = à</b> のアクセント記号（クラーゼ acento grave）を忘れない こと。書き言葉でも話し言葉でも区別が必要。' },

/* ============================================================
   FSRS scheduler (loaded async via ESM)
   ============================================================ */
let fsrsLib = null;          // { createEmptyCard, fsrs, Rating, State }
let scheduler = null;
let fsrsReady = false;
const fsrsReadyCallbacks = [];

window.addEventListener('fsrs-ready', () => {
  fsrsLib = window.tsfsrs;
  scheduler = fsrsLib.fsrs({
    request_retention: 0.9,
    enable_fuzz: true,
    enable_short_term: true,
  });
  fsrsReady = true;
  fsrsReadyCallbacks.forEach(cb => cb());
  fsrsReadyCallbacks.length = 0;
  // refresh UI
  refreshAll();
});

function whenFsrsReady(cb) {
  if (fsrsReady) cb();
  else fsrsReadyCallbacks.push(cb);
}

/* ============================================================
   Card extraction & state management
   ============================================================ */
const STORAGE_PREFIX = 'pt_caderno__';
const CARDS_KEY = STORAGE_PREFIX + 'cards';     // { [cardId]: cardState }
const NOTES_KEY_PREFIX = 'pt_note__';           // existing personal notes
const STATS_KEY = STORAGE_PREFIX + 'stats';     // { reviewsByDate: { 'yyyy-mm-dd': n } }
const LEARNED_KEY = STORAGE_PREFIX + 'learned'; // { [tagId]: true } — user-marked "learned"

// Build the canonical list of (cardId, tagId, pt, jp, source) from NOTES.
// IDs are stable: based on stripped pt content + tag id, so order changes don't matter.
function stripHtml(s) {
  return s.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
}

function getAllCards() {
  const cards = [];
  NOTES.forEach(note => {
    // Examples in sections (the ones marked card: true OR by default we card them all? — only marked)
    // Actually we card ALL examples for richer practice, since they're hand-curated.
    note.sections.forEach(s => {
      if (s.type === 'example') {
        const pt = stripHtml(s.pt);
        const cardId = `${note.id}::${pt}`;
        cards.push({
          cardId,
          tagId: note.id,
          pt: s.pt,           // keep formatting for display
          ptPlain: pt,
          jp: s.jp || '',
          source: s.source || '',
          origin: 'example',
        });
      }
    });
    // Variations (cards array)
    if (Array.isArray(note.cards)) {
      note.cards.forEach(c => {
        const pt = c.pt;
        const cardId = `${note.id}::${pt}`;
        cards.push({
          cardId,
          tagId: note.id,
          pt: c.pt,
          ptPlain: pt,
          jp: c.jp || '',
          source: '',
          origin: 'variation',
        });
      });
    }
  });
  return cards;
}

function loadCardStates() {
  try {
    const raw = localStorage.getItem(CARDS_KEY);
    if (!raw) return {};
    const obj = JSON.parse(raw);
    // Restore Date objects from ISO strings
    Object.values(obj).forEach(state => {
      if (state.due) state.due = new Date(state.due);
      if (state.last_review) state.last_review = new Date(state.last_review);
    });
    return obj;
  } catch (e) {
    console.warn('Failed to parse card states', e);
    return {};
  }
}

function saveCardStates(states) {
  // Serialize Date objects to ISO strings for storage
  const serialized = {};
  Object.entries(states).forEach(([k, v]) => {
    serialized[k] = { ...v };
    if (v.due instanceof Date) serialized[k].due = v.due.toISOString();
    if (v.last_review instanceof Date) serialized[k].last_review = v.last_review.toISOString();
  });
  localStorage.setItem(CARDS_KEY, JSON.stringify(serialized));
}

function getCardState(cardId, states) {
  if (states[cardId]) return states[cardId];
  if (!fsrsLib) return null;
  // create empty card
  return fsrsLib.createEmptyCard();
}

function loadStats() {
  try {
    const raw = localStorage.getItem(STATS_KEY);
    return raw ? JSON.parse(raw) : { reviewsByDate: {} };
  } catch {
    return { reviewsByDate: {} };
  }
}

function saveStats(stats) {
  localStorage.setItem(STATS_KEY, JSON.stringify(stats));
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function recordReview() {
  const s = loadStats();
  const k = todayKey();
  s.reviewsByDate[k] = (s.reviewsByDate[k] || 0) + 1;
  saveStats(s);
}

/* ============================================================
   Learned tags (user-toggled flag per tag)
   ============================================================ */
function loadLearned() {
  try {
    const raw = localStorage.getItem(LEARNED_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}

function saveLearned(obj) {
  localStorage.setItem(LEARNED_KEY, JSON.stringify(obj));
}

function isLearned(tagId) {
  return !!loadLearned()[tagId];
}

function setLearned(tagId, value) {
  const obj = loadLearned();
  if (value) obj[tagId] = true;
  else delete obj[tagId];
  saveLearned(obj);
}

function toggleLearned(tagId) {
  setLearned(tagId, !isLearned(tagId));
  refreshAll();
}

/* ============================================================
   Per-tag card statistics
   ============================================================ */
function getTagStats(tagId) {
  const cards = getAllCards().filter(c => c.tagId === tagId);
  const states = loadCardStates();
  const now = new Date();
  let dueNow = 0, newCount = 0, learning = 0, learned = 0;
  cards.forEach(c => {
    const st = states[c.cardId];
    if (!st) {
      newCount++;
      dueNow++; // new cards are always available
    } else {
      const due = st.due instanceof Date ? st.due : new Date(st.due);
      if (due <= now) dueNow++;
      // State 0=New, 1=Learning, 2=Review, 3=Relearning
      if (st.state === 2) learned++;
      else if (st.state === 1 || st.state === 3) learning++;
      else newCount++;
    }
  });
  return { total: cards.length, dueNow, newCount, learning, learned };
}

function getOverallStats(filter = null) {
  const allCardsRaw = getAllCards();
  const allCards = filter ? allCardsRaw.filter(filter) : allCardsRaw;
  const states = loadCardStates();
  const now = new Date();
  let dueNow = 0, newCount = 0, learning = 0, learned = 0;
  // upcoming days
  const upcoming = {}; // day offset -> count
  for (let i = 0; i < 14; i++) upcoming[i] = 0;
  
  allCards.forEach(c => {
    const st = states[c.cardId];
    if (!st) {
      newCount++;
      dueNow++;
      upcoming[0]++;
    } else {
      const due = st.due instanceof Date ? st.due : new Date(st.due);
      if (due <= now) dueNow++;
      if (st.state === 2) learned++;
      else if (st.state === 1 || st.state === 3) learning++;
      else newCount++;
      // upcoming
      const diffMs = due - now;
      const dayOffset = Math.max(0, Math.floor(diffMs / (1000 * 60 * 60 * 24)));
      if (dayOffset < 14) upcoming[dayOffset]++;
    }
  });
  
  // today's reviews — note: review counts are date-based only (no per-card history),
  // so they can't be filtered by tag. Always returns global totals.
  const stats = loadStats();
  const todayReviews = stats.reviewsByDate[todayKey()] || 0;
  // last 7 days
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    last7.push({ date: k, count: stats.reviewsByDate[k] || 0 });
  }
  
  return {
    total: allCards.length,
    dueNow, newCount, learning, learned,
    upcoming, todayReviews, last7,
  };
}

/* ============================================================
   RENDERING — Tag list
   ============================================================ */
const tagListEl = document.getElementById('tagList');
const noteViewEl = document.getElementById('noteView');
const homeEl = document.getElementById('home');
const noResultsEl = document.getElementById('noResults');
const searchInput = document.getElementById('searchInput');

function renderTagList(filter = '') {
  const f = filter.toLowerCase().trim();
  let visible = 0;
  tagListEl.innerHTML = '';

  NOTES.forEach((note) => {
    const haystack = [
      note.id, note.name, note.pattern, note.theme, note.source,
      ...note.sections.flatMap(s => Object.values(s).filter(v => typeof v === 'string'))
    ].join(' ').toLowerCase();

    if (f && !haystack.includes(f)) return;
    visible++;

    const hasNote = !!localStorage.getItem(NOTES_KEY_PREFIX + note.id);
    const ts = getTagStats(note.id);
    
    const metaItems = [`${ts.total} cards`];
    if (ts.dueNow > 0) metaItems.push(`<span class="due-now">${ts.dueNow} 期日</span>`);
    if (ts.learned > 0) metaItems.push(`<span style="color:var(--good-border);">${ts.learned} 習得</span>`);
    if (hasNote) metaItems.push(`<span class="has-note">✎ メモ</span>`);

    const li = document.createElement('li');
    li.innerHTML = `
      <div class="tag-content">
        <div class="tag-name">${highlight(note.name, f)}</div>
        <div class="tag-pattern">${highlight(note.pattern, f)}</div>
        <div class="tag-theme">${highlight(note.theme, f)}</div>
        <div class="tag-meta">${metaItems.join(' · ')}</div>
      </div>
      <span class="tag-arrow">→</span>
    `;
    li.addEventListener('click', () => openNote(note.id));
    tagListEl.appendChild(li);
  });

  noResultsEl.style.display = visible === 0 ? 'block' : 'none';
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${escapeReg(q)})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}
function escapeReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function openNote(id) {
  const note = NOTES.find(n => n.id === id);
  if (!note) return;
  homeEl.style.display = 'none';
  document.querySelector('#page-index .search-wrap').style.display = 'none';
  noteViewEl.classList.add('active');
  noteViewEl.style.display = '';
  noteViewEl.innerHTML = renderNote(note);
  bindNoteHandlers(note);
  window.scrollTo(0, 0);
  history.replaceState(null, '', `#${id}`);
}

function closeNote() {
  homeEl.style.display = '';
  document.querySelector('#page-index .search-wrap').style.display = '';
  noteViewEl.classList.remove('active');
  noteViewEl.style.display = 'none';
  noteViewEl.innerHTML = '';
  window.scrollTo(0, 0);
  history.replaceState(null, '', window.location.pathname);
  renderTagList(searchInput.value);
}

function renderNote(note) {
  const sectionsHtml = note.sections.map(renderSection).join('');
  const ts = getTagStats(note.id);
  const dueLabel = ts.dueNow > 0 ? `今すぐ復習 <span class="count">${ts.dueNow}</span>` : 'カード（期日なし）';
  return `
    <button class="back-link" onclick="closeNote()">← Índice に戻る</button>
    <h1>#${note.id}</h1>
    <h2>${note.name}</h2>
    <div class="study-launch">
      <button class="study-btn ${ts.dueNow === 0 ? 'disabled' : ''}" 
              ${ts.dueNow === 0 ? 'disabled' : ''}
              onclick="startStudy('${note.id}')">
        ${dueLabel}
      </button>
      ${ts.total > ts.dueNow ? `<button class="study-btn" style="background:var(--paper-deep);color:var(--ink);" onclick="startStudy('${note.id}', true)">全カード復習 <span class="count" style="background:rgba(0,0,0,0.08);color:var(--ink-soft);">${ts.total}</span></button>` : ''}
    </div>
    ${sectionsHtml}

    <h3>追加メモ</h3>
    <div class="notes-area">
      <textarea class="notes-textarea" id="notes_${note.id}" placeholder="このタグについて気づいたこと、ネイティブから聞いた表現、混同しやすい点などを自由に書き留めてください…"></textarea>
      <div class="notes-meta" id="meta_${note.id}">未保存</div>
    </div>
  `;
}

function renderSection(s) {
  switch (s.type) {
    case 'lead': return `<p class="lead">${s.text}</p>`;
    case 'h3': return `<h3>${s.text}</h3>`;
    case 'h4': return `<h4>${s.num ? `<span class="num">${s.num}.</span>` : ''}${s.text}</h4>`;
    case 'p': return `<p>${s.text}</p>`;
    case 'example':
      return `<div class="example">
        <div class="pt-line">${s.pt}</div>
        ${s.jp ? `<div class="jp-line">${s.jp}</div>` : ''}
        ${s.source ? `<div class="source">— ${s.source}</div>` : ''}
      </div>`;
    case 'table': {
      const head = s.headers.map(h => `<th>${h}</th>`).join('');
      const body = s.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
      return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }
    case 'conj': {
      const body = s.rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
      return `<table class="conj"><tbody>${body}</tbody></table>`;
    }
    case 'warning': return `<div class="callout warning">${s.text}</div>`;
    case 'tip': return `<div class="callout tip">${s.text}</div>`;
    case 'mistake':
      return `<div class="mistake-row">
        <span class="wrong">${s.wrong}</span>
        <span class="right">${s.right}</span>
        ${s.reason ? `<div class="reason">— ${s.reason}</div>` : ''}
      </div>`;
    case 'related': {
      const tags = s.tags.map(t => {
        if (t.future) return `<span class="related-tag future">${t.label}</span>`;
        return `<span class="related-tag" data-id="${t.id}">${t.label}</span>`;
      }).join('');
      return `<div class="related-tags">${tags}</div>`;
    }
    default: return '';
  }
}

function bindNoteHandlers(note) {
  noteViewEl.querySelectorAll('.related-tag[data-id]').forEach(el => {
    el.addEventListener('click', () => openNote(el.dataset.id));
  });

  const ta = document.getElementById(`notes_${note.id}`);
  const meta = document.getElementById(`meta_${note.id}`);
  const key = NOTES_KEY_PREFIX + note.id;
  const stored = localStorage.getItem(key);
  if (stored) {
    try {
      const obj = JSON.parse(stored);
      ta.value = obj.text || '';
      meta.textContent = obj.savedAt ? `最終保存: ${formatDate(obj.savedAt)}` : '';
    } catch {
      ta.value = stored;
    }
  }

  let saveTimer;
  ta.addEventListener('input', () => {
    clearTimeout(saveTimer);
    meta.textContent = '入力中…';
    saveTimer = setTimeout(() => {
      const obj = { text: ta.value, savedAt: Date.now() };
      localStorage.setItem(key, JSON.stringify(obj));
      meta.innerHTML = `<span class="saved-flash">✓ 保存しました</span> · ${formatDate(obj.savedAt)}`;
      setTimeout(() => {
        meta.textContent = `最終保存: ${formatDate(obj.savedAt)}`;
      }, 1400);
    }, 500);
  });
}

function formatDate(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/* ============================================================
   Study session (FSRS)
   ============================================================ */
let session = null;

// scope: tagId | null (=all) | '__learned__' (=learned tags only)
function startStudy(scope, includeAll = false) {
  whenFsrsReady(() => _startStudy(scope, includeAll));
}

function _startStudy(scope, includeAll) {
  const allCards = getAllCards();
  const states = loadCardStates();
  const now = new Date();

  let pool = allCards;
  if (scope === '__learned__') {
    const learned = loadLearned();
    pool = pool.filter(c => learned[c.tagId]);
  } else if (scope) {
    pool = pool.filter(c => c.tagId === scope);
  }

  // Filter to due cards (or all if includeAll)
  let queue = pool.filter(c => {
    const st = states[c.cardId];
    if (!st) return true; // new
    const due = st.due instanceof Date ? st.due : new Date(st.due);
    return includeAll || due <= now;
  });

  if (queue.length === 0) {
    showToast('復習対象のカードがありません');
    return;
  }

  // Shuffle
  queue = queue.sort(() => Math.random() - 0.5);

  session = {
    queue,
    index: 0,
    correct: 0,
    again: 0,
    hard: 0,
    good: 0,
    easy: 0,
    states,
    revealed: false,
    startedAt: Date.now(),
  };
  
  document.getElementById('studyOverlay').classList.add('active');
  showCard();
}

function endStudy() {
  document.getElementById('studyOverlay').classList.remove('active');
  session = null;
  refreshAll();
}

function showCard() {
  if (!session) return;
  if (session.index >= session.queue.length) {
    showStudyDone();
    return;
  }
  const card = session.queue[session.index];
  const note = NOTES.find(n => n.id === card.tagId);
  
  document.getElementById('studyProgress').textContent = 
    `${session.index + 1} / ${session.queue.length}`;
  
  const body = document.getElementById('studyBody');
  body.innerHTML = `
    <div class="study-prompt-label">日本語</div>
    <div class="study-prompt">${card.jp}</div>
    <button class="study-reveal-btn" id="revealBtn">答えを表示</button>
  `;
  document.getElementById('revealBtn').addEventListener('click', revealAnswer);
  session.revealed = false;
  window.scrollTo(0, 0);
}

function revealAnswer() {
  if (!session) return;
  const card = session.queue[session.index];
  const states = session.states;
  const cardState = states[card.cardId] || fsrsLib.createEmptyCard();
  
  // Get preview of all 4 ratings
  const preview = scheduler.repeat(cardState, new Date());
  
  const intervalLabel = (state) => {
    const due = state.due instanceof Date ? state.due : new Date(state.due);
    return formatInterval(due - new Date());
  };
  
  const body = document.getElementById('studyBody');
  const baseUrl = window.location.href.split('#')[0];
  const tagUrl = `${baseUrl}#${card.tagId}`;
  body.innerHTML = `
    <a class="study-tag-meta study-tag-link" href="${tagUrl}" target="_blank" rel="noopener">
      #${card.tagId} <span class="ext-arrow">↗</span>
    </a>
    <div class="study-prompt-label">日本語</div>
    <div class="study-prompt">${card.jp}</div>
    <div class="study-answer">
      <div class="study-answer-label">正解 — Português</div>
      <div class="study-answer-row">
        <div class="study-answer-pt">${card.pt}</div>
        <button class="copy-btn" id="copyPtBtn" title="ポルトガル語をコピー">
          <span class="copy-icon">⧉</span>
          <span class="copy-label">コピー</span>
        </button>
      </div>
      ${card.source ? `<div class="study-answer-source">— ${card.source}</div>` : ''}
      <div class="rating-grid">
        <button class="rating-btn again" data-rating="1">
          <span class="label">Again</span>
          <span class="interval">${intervalLabel(preview[fsrsLib.Rating.Again].card)}</span>
        </button>
        <button class="rating-btn hard" data-rating="2">
          <span class="label">Hard</span>
          <span class="interval">${intervalLabel(preview[fsrsLib.Rating.Hard].card)}</span>
        </button>
        <button class="rating-btn good" data-rating="3">
          <span class="label">Good</span>
          <span class="interval">${intervalLabel(preview[fsrsLib.Rating.Good].card)}</span>
        </button>
        <button class="rating-btn easy" data-rating="4">
          <span class="label">Easy</span>
          <span class="interval">${intervalLabel(preview[fsrsLib.Rating.Easy].card)}</span>
        </button>
      </div>
      <div style="font-family:var(--jp);font-size:11px;color:var(--ink-fade);margin-top:14px;line-height:1.6;text-align:center;">
        Again = 思い出せなかった / Hard = 苦労した / Good = 普通 / Easy = 簡単
      </div>
    </div>
  `;
  
  document.querySelectorAll('.rating-btn').forEach(btn => {
    btn.addEventListener('click', () => rateCard(parseInt(btn.dataset.rating)));
  });
  
  // Copy button
  const copyBtn = document.getElementById('copyPtBtn');
  if (copyBtn) {
    copyBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const plainText = stripHtml(card.pt);
      try {
        await navigator.clipboard.writeText(plainText);
        copyBtn.classList.add('copied');
        copyBtn.querySelector('.copy-icon').textContent = '✓';
        copyBtn.querySelector('.copy-label').textContent = 'コピー済';
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.querySelector('.copy-icon').textContent = '⧉';
          copyBtn.querySelector('.copy-label').textContent = 'コピー';
        }, 1600);
      } catch (err) {
        // Fallback for older browsers / restricted contexts
        try {
          const ta = document.createElement('textarea');
          ta.value = plainText;
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          copyBtn.classList.add('copied');
          copyBtn.querySelector('.copy-icon').textContent = '✓';
          copyBtn.querySelector('.copy-label').textContent = 'コピー済';
          setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.querySelector('.copy-icon').textContent = '⧉';
            copyBtn.querySelector('.copy-label').textContent = 'コピー';
          }, 1600);
        } catch (err2) {
          showToast('コピーに失敗しました', true);
        }
      }
    });
  }
  
  session.revealed = true;
}

function formatInterval(ms) {
  if (ms <= 0) return '即';
  const minutes = ms / (1000 * 60);
  const hours = ms / (1000 * 60 * 60);
  const days = ms / (1000 * 60 * 60 * 24);
  if (minutes < 60) return `${Math.round(minutes)}分`;
  if (hours < 24) return `${Math.round(hours)}時間`;
  if (days < 30) return `${Math.round(days)}日`;
  if (days < 365) return `${(days / 30).toFixed(1)}月`;
  return `${(days / 365).toFixed(1)}年`;
}

function rateCard(rating) {
  if (!session || !session.revealed) return;
  const card = session.queue[session.index];
  const cardState = session.states[card.cardId] || fsrsLib.createEmptyCard();
  
  const result = scheduler.next(cardState, new Date(), rating);
  session.states[card.cardId] = result.card;
  
  // session counters
  if (rating === 1) session.again++;
  else if (rating === 2) session.hard++;
  else if (rating === 3) session.good++;
  else if (rating === 4) session.easy++;
  if (rating >= 2) session.correct++;
  
  // Save after each card
  saveCardStates(session.states);
  recordReview();
  
  // If "Again", re-queue the card at end
  if (rating === 1) {
    session.queue.push(card);
  }
  
  session.index++;
  showCard();
}

function showStudyDone() {
  const body = document.getElementById('studyBody');
  const total = session.again + session.hard + session.good + session.easy;
  const elapsed = Math.round((Date.now() - session.startedAt) / 1000);
  body.innerHTML = `
    <div class="study-done">
      <div class="ornament">❦ · ❦ · ❦</div>
      <h2>Sessão concluída!</h2>
      <div class="stats">
        <div>復習カード数<span>${total}</span></div>
        <div>所要時間<span>${formatElapsed(elapsed)}</span></div>
        <div>Again<span>${session.again}</span></div>
        <div>Hard<span>${session.hard}</span></div>
        <div>Good<span>${session.good}</span></div>
        <div>Easy<span>${session.easy}</span></div>
      </div>
      <div class="next-actions">
        <button class="study-btn" onclick="endStudy()">完了</button>
      </div>
    </div>
  `;
  document.getElementById('studyProgress').textContent = '✓';
}

function formatElapsed(sec) {
  if (sec < 60) return `${sec}秒`;
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}分${s}秒`;
}

document.getElementById('studyClose').addEventListener('click', () => {
  if (session && session.index < session.queue.length) {
    if (!confirm('セッションを中断しますか？ここまでの進捗は保存されます。')) return;
  }
  endStudy();
});

/* ============================================================
   Stats page
   ============================================================ */
const STATS_FILTER_KEY = STORAGE_PREFIX + 'stats_filter_learned_only'; // 'true' | 'false'

function getStatsFilterLearnedOnly() {
  const v = localStorage.getItem(STATS_FILTER_KEY);
  // Default: ON (true) when key not set
  return v === null ? true : v === 'true';
}

function setStatsFilterLearnedOnly(value) {
  localStorage.setItem(STATS_FILTER_KEY, value ? 'true' : 'false');
}

function toggleStatsFilter() {
  setStatsFilterLearnedOnly(!getStatsFilterLearnedOnly());
  _renderStats();
}

function renderStats() {
  whenFsrsReady(() => _renderStats());
}

function _renderStats() {
  const learned = loadLearned();
  const learnedTagIds = Object.keys(learned).filter(k => learned[k]);
  const filterOn = getStatsFilterLearnedOnly();
  
  // Build the filter function only if toggle is ON AND there are learned tags
  // (if toggle is ON but no learned tags exist, applying the filter would yield 0 cards
  //  which is unhelpful — we still show the empty state and let the user know.)
  const filter = filterOn ? (c => learned[c.tagId]) : null;
  const overall = getOverallStats(filter);
  const el = document.getElementById('statsContent');
  
  // Filter scope notice
  const scopeNoticeHtml = `
    <div class="stats-filter-bar">
      <label class="filter-toggle">
        <input type="checkbox" id="filterLearnedOnly" ${filterOn ? 'checked' : ''}>
        <span class="filter-track"><span class="filter-thumb"></span></span>
        <span class="filter-label">学習済みタグのみ表示</span>
      </label>
      <div class="filter-scope">
        ${filterOn 
          ? (learnedTagIds.length > 0 
              ? `スコープ: 学習済み <b>${learnedTagIds.length}</b> タグ`
              : `<span class="filter-empty">学習済みタグが0個 — Estudar タブで✓を付けてください</span>`)
          : `スコープ: <b>全タグ</b>`}
      </div>
    </div>
  `;
  
  // Upcoming chart
  const maxUpcoming = Math.max(1, ...Object.values(overall.upcoming));
  let upcomingHtml = '<div class="upcoming-chart"><div style="font-family:var(--serif-display);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-fade);margin-bottom:12px;font-style:italic;">向こう14日間の復習予定</div>';
  for (let i = 0; i < 14; i++) {
    const count = overall.upcoming[i];
    const pct = (count / maxUpcoming) * 100;
    const label = i === 0 ? '今日' : i === 1 ? '明日' : `${i}日後`;
    upcomingHtml += `
      <div class="upcoming-row">
        <span class="day">${label}</span>
        <div class="bar-wrap"><div class="bar" style="width:${pct}%;${count === 0 ? 'background:var(--rule);' : ''}"></div></div>
        <span class="count">${count}</span>
      </div>
    `;
  }
  upcomingHtml += '</div>';

  // Last 7 days reviews — note: stored only as date totals, can't be tag-filtered
  const max7 = Math.max(1, ...overall.last7.map(d => d.count));
  let last7Html = `<div class="upcoming-chart" style="margin-top:24px;">
    <div style="font-family:var(--serif-display);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-fade);margin-bottom:4px;font-style:italic;">過去7日間の復習実績</div>
    <div style="font-family:var(--jp);font-size:10px;color:var(--ink-fade);margin-bottom:12px;font-style:italic;">※ この実績は全タグの累計（フィルタ対象外）</div>`;
  overall.last7.forEach((d, idx) => {
    const pct = (d.count / max7) * 100;
    const dt = new Date(d.date);
    const lbl = idx === 6 ? '今日' : `${dt.getMonth()+1}/${dt.getDate()}`;
    last7Html += `
      <div class="upcoming-row">
        <span class="day">${lbl}</span>
        <div class="bar-wrap"><div class="bar" style="width:${pct}%;background:linear-gradient(to right, var(--gold), var(--terracotta));${d.count === 0 ? 'background:var(--rule);' : ''}"></div></div>
        <span class="count">${d.count}</span>
      </div>
    `;
  });
  last7Html += '</div>';

  el.innerHTML = `
    ${scopeNoticeHtml}
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">期日のカード</div>
        <div class="stat-value terracotta">${overall.dueNow}</div>
        <div class="stat-sub">今すぐ復習可能</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">今日の復習</div>
        <div class="stat-value gold">${overall.todayReviews}</div>
        <div class="stat-sub">本日完了したカード数 (全体)</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">習得済み</div>
        <div class="stat-value green">${overall.learned}</div>
        <div class="stat-sub">/ ${overall.total} カード</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">学習中</div>
        <div class="stat-value azulejo">${overall.learning}</div>
        <div class="stat-sub">${overall.newCount} 未着手</div>
      </div>
    </div>
    ${upcomingHtml}
    ${last7Html}
  `;
  
  // Bind toggle
  const cb = document.getElementById('filterLearnedOnly');
  if (cb) {
    cb.addEventListener('change', toggleStatsFilter);
  }
}

function exportData() {
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    cards: loadCardStates(),
    stats: loadStats(),
    learned: loadLearned(),
    notes: {},
  };
  // Personal notes
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(NOTES_KEY_PREFIX)) {
      data.notes[k.slice(NOTES_KEY_PREFIX.length)] = localStorage.getItem(k);
    }
  }
  
  // Serialize Date objects
  const serialized = JSON.parse(JSON.stringify(data, (key, value) => {
    if (value instanceof Date) return value.toISOString();
    return value;
  }));
  
  const json = JSON.stringify(serialized, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  a.href = url;
  a.download = `caderno-pt-backup-${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('エクスポート完了');
}

document.getElementById('importFileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.version || typeof data !== 'object') {
        throw new Error('不正なファイル形式');
      }
      const learnedCount = data.learned ? Object.keys(data.learned).filter(k => data.learned[k]).length : 0;
      if (!confirm(`このバックアップで現在のデータを置き換えますか？\n\nエクスポート日時: ${data.exportedAt || '不明'}\nバージョン: ${data.version}\nカード状態: ${Object.keys(data.cards || {}).length} 件\n学習済みタグ: ${learnedCount} 個\n\n※現在のデータは上書きされます。`)) {
        return;
      }
      
      // Restore cards
      if (data.cards) {
        const restored = {};
        Object.entries(data.cards).forEach(([k, v]) => {
          restored[k] = { ...v };
          if (v.due) restored[k].due = new Date(v.due);
          if (v.last_review) restored[k].last_review = new Date(v.last_review);
        });
        saveCardStates(restored);
      }
      
      // Restore stats
      if (data.stats) {
        saveStats(data.stats);
      }
      
      // Restore learned tags (v2+; for v1 backups, we clear existing learned to avoid stale state)
      if (data.learned !== undefined) {
        saveLearned(data.learned || {});
      } else {
        // v1 backup — keep existing learned flags as-is (don't wipe user's current selection)
      }
      
      // Restore notes
      if (data.notes) {
        // First remove existing notes
        const toRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(NOTES_KEY_PREFIX)) toRemove.push(k);
        }
        toRemove.forEach(k => localStorage.removeItem(k));
        // Add restored notes
        Object.entries(data.notes).forEach(([id, content]) => {
          localStorage.setItem(NOTES_KEY_PREFIX + id, content);
        });
      }
      
      showToast('インポート完了');
      refreshAll();
    } catch (err) {
      console.error(err);
      showToast('インポート失敗: ' + err.message, true);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

function resetCards() {
  if (!confirm('FSRSのカード進捗をすべて削除しますか？\n（メモと個人設定は保持されます）')) return;
  if (!confirm('本当によろしいですか？この操作は取り消せません。')) return;
  localStorage.removeItem(CARDS_KEY);
  localStorage.removeItem(STATS_KEY);
  showToast('進捗をリセットしました');
  refreshAll();
}

function resetAll() {
  if (!confirm('全データ（カード進捗・メモ・統計）を削除しますか？')) return;
  if (!confirm('本当によろしいですか？この操作は取り消せません。\nバックアップは取りましたか？')) return;
  // Remove only our keys
  const toRemove = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && (k.startsWith(STORAGE_PREFIX) || k.startsWith(NOTES_KEY_PREFIX))) toRemove.push(k);
  }
  toRemove.forEach(k => localStorage.removeItem(k));
  showToast('全データを削除しました');
  refreshAll();
}

/* ============================================================
   Refresh helpers
   ============================================================ */
function refreshAll() {
  renderTagList(searchInput.value);
  updateDueBadge();
  // Re-render currently active page
  const active = document.querySelector('.page.active');
  if (active && active.id === 'page-study') renderStudyLauncher();
  if (active && active.id === 'page-stats') _renderStats();
  if (active && active.id === 'page-settings') renderSettings();
}

function updateDueBadge() {
  const overall = getOverallStats();
  const badge = document.getElementById('dueBadge');
  if (overall.dueNow > 0) {
    badge.textContent = overall.dueNow;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

/* ============================================================
   INIT
   ============================================================ */
searchInput.addEventListener('input', e => renderTagList(e.target.value));
renderTagList();
updateDueBadge();

const initialHash = window.location.hash.slice(1);
if (initialHash && NOTES.find(n => n.id === initialHash)) {
  openNote(initialHash);
}

window.addEventListener('popstate', () => {
  const h = window.location.hash.slice(1);
  if (h && NOTES.find(n => n.id === h)) {
    openNote(h);
  } else {
    closeNote();
  }
});

window.resetCards = resetCards;
