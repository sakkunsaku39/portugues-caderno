<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Caderno PT">
<meta name="theme-color" content="#f5efe4">
<title>Caderno · Português Europeu</title>
<style>
  /* ---------- Fonts ---------- */
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap');

  /* ---------- Tokens ---------- */
  :root {
    --paper: #f5efe4;
    --paper-deep: #ede5d3;
    --ink: #1a1814;
    --ink-soft: #4a443a;
    --ink-fade: #7a7264;
    --rule: #d4c9b0;
    --rule-soft: #e3d9c2;
    --azulejo: #2c5f7c;
    --azulejo-deep: #1e4257;
    --terracotta: #b8593a;
    --gold: #a87c2c;
    --highlight: #f4e4a1;
    --warning-bg: #f7e4dc;
    --warning-border: #b8593a;
    --good-bg: #e0e8d8;
    --good-border: #5a7a3a;

    --serif-display: 'Fraunces', 'Noto Serif JP', serif;
    --serif-body: 'Cormorant Garamond', 'Noto Serif JP', serif;
    --jp: 'Noto Serif JP', serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: var(--serif-body);
    font-size: 19px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(168, 124, 44, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(44, 95, 124, 0.04) 0%, transparent 40%);
    min-height: 100vh;
    padding-bottom: 80px;
    /* paper texture */
    background-attachment: fixed;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.5;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.35 0 0 0 0 0.25 0 0 0 0.05 0'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
  }

  /* ---------- Layout ---------- */
  .shell {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ---------- Masthead ---------- */
  header.masthead {
    padding: 56px 0 28px;
    text-align: center;
    border-bottom: 1px double var(--rule);
    margin-bottom: 32px;
  }
  .masthead .eyebrow {
    font-family: var(--serif-display);
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-fade);
    margin-bottom: 14px;
  }
  .masthead h1 {
    font-family: var(--serif-display);
    font-weight: 500;
    font-size: clamp(32px, 8vw, 44px);
    letter-spacing: -0.01em;
    line-height: 1.05;
    font-variation-settings: "opsz" 144, "SOFT" 30;
  }
  .masthead h1 em {
    font-style: italic;
    color: var(--azulejo);
    font-weight: 400;
  }
  .masthead .sub {
    font-family: var(--jp);
    font-size: 13px;
    color: var(--ink-fade);
    margin-top: 14px;
    letter-spacing: 0.05em;
  }

  /* ---------- Search ---------- */
  .search-wrap {
    margin-bottom: 28px;
    position: sticky;
    top: 0;
    background: var(--paper);
    padding: 12px 0;
    z-index: 10;
    border-bottom: 1px solid var(--rule-soft);
  }
  .search-input {
    width: 100%;
    padding: 12px 16px 12px 42px;
    font-family: var(--serif-body);
    font-size: 17px;
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus {
    border-color: var(--azulejo);
  }
  .search-input::placeholder {
    color: var(--ink-fade);
    font-style: italic;
  }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-fade);
    font-size: 18px;
    pointer-events: none;
  }

  /* ---------- Tag Index (home) ---------- */
  .tag-index {
    margin-bottom: 48px;
  }
  .index-title {
    font-family: var(--serif-display);
    font-size: 13px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-fade);
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .tag-list {
    list-style: none;
    counter-reset: tag-counter;
  }
  .tag-list li {
    counter-increment: tag-counter;
    border-bottom: 1px dotted var(--rule);
    padding: 18px 0;
    cursor: pointer;
    transition: padding-left 0.25s ease, background 0.2s;
    position: relative;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .tag-list li:hover {
    padding-left: 8px;
    background: linear-gradient(to right, rgba(168, 124, 44, 0.06), transparent 60%);
  }
  .tag-list li::before {
    content: counter(tag-counter, decimal-leading-zero);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-fade);
    flex-shrink: 0;
    width: 28px;
    padding-top: 4px;
  }
  .tag-list .tag-content {
    flex: 1;
  }
  .tag-list .tag-name {
    font-family: var(--serif-display);
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 4px;
    font-variation-settings: "opsz" 60;
  }
  .tag-list .tag-pattern {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--azulejo);
    margin-bottom: 6px;
    word-break: break-word;
  }
  .tag-list .tag-theme {
    font-family: var(--jp);
    font-size: 13px;
    color: var(--ink-soft);
  }
  .tag-list .tag-arrow {
    color: var(--ink-fade);
    font-family: var(--serif-body);
    font-size: 24px;
    align-self: center;
    transition: transform 0.25s;
  }
  .tag-list li:hover .tag-arrow {
    transform: translateX(4px);
    color: var(--azulejo);
  }
  .tag-list .has-note-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--terracotta);
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ---------- Note view ---------- */
  .note-view { display: none; }
  .note-view.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .back-link {
    font-family: var(--serif-display);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-fade);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 0;
    margin-bottom: 24px;
    font-style: italic;
  }
  .back-link:hover { color: var(--azulejo); }

  .note-view h1 {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-fade);
    font-weight: 400;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  .note-view h2 {
    font-family: var(--serif-display);
    font-size: clamp(26px, 6vw, 34px);
    font-weight: 500;
    line-height: 1.15;
    margin: 8px 0 24px;
    font-variation-settings: "opsz" 100;
    color: var(--ink);
  }
  .note-view h2 em {
    font-style: italic;
    color: var(--azulejo);
    font-weight: 400;
  }

  .note-view h3 {
    font-family: var(--serif-display);
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin: 40px 0 16px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--rule);
    font-weight: 600;
  }

  .note-view h4 {
    font-family: var(--serif-display);
    font-size: 18px;
    font-weight: 600;
    margin: 28px 0 12px;
    color: var(--ink);
    font-variation-settings: "opsz" 50;
  }
  .note-view h4 .num {
    color: var(--gold);
    font-family: var(--mono);
    font-size: 13px;
    margin-right: 8px;
    font-weight: 400;
  }

  .note-view p {
    font-family: var(--jp);
    font-size: 15px;
    line-height: 1.85;
    margin-bottom: 14px;
    color: var(--ink-soft);
  }
  .note-view p.lead {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 19px;
    color: var(--azulejo-deep);
    padding: 16px 0 16px 20px;
    border-left: 3px solid var(--azulejo);
    background: linear-gradient(to right, rgba(44, 95, 124, 0.04), transparent);
    margin: 16px 0 24px;
  }

  /* portuguese sentence */
  .pt {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 18px;
    color: var(--ink);
    font-weight: 500;
  }
  .pt strong {
    background: linear-gradient(to bottom, transparent 60%, var(--highlight) 60%);
    font-weight: 600;
    font-style: italic;
  }

  /* example block */
  .example {
    margin: 12px 0 16px;
    padding: 14px 18px;
    border-left: 2px solid var(--rule);
    background: rgba(237, 229, 211, 0.4);
  }
  .example .pt-line { font-family: var(--serif-body); font-style: italic; font-size: 18px; line-height: 1.4; }
  .example .pt-line strong {
    background: linear-gradient(to bottom, transparent 60%, var(--highlight) 60%);
    font-weight: 600;
  }
  .example .jp-line {
    font-family: var(--jp); font-size: 13px; color: var(--ink-soft);
    margin-top: 4px;
  }
  .example .source {
    font-family: var(--serif-display); font-style: italic; font-size: 11px;
    color: var(--ink-fade); margin-top: 6px;
    letter-spacing: 0.04em;
  }

  /* tables */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0 24px;
    font-size: 14px;
  }
  th, td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--rule-soft);
    vertical-align: top;
  }
  th {
    font-family: var(--serif-display);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-fade);
    border-bottom: 1.5px solid var(--rule);
  }
  td.pt-cell {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 16px;
    color: var(--ink);
  }
  td.jp-cell {
    font-family: var(--jp);
    font-size: 13px;
    color: var(--ink-soft);
  }
  td .hl {
    background: linear-gradient(to bottom, transparent 60%, var(--highlight) 60%);
    font-weight: 600;
  }
  table.conj {
    max-width: 360px;
  }
  table.conj td:first-child {
    font-family: var(--jp);
    color: var(--ink-fade);
    font-size: 13px;
    width: 35%;
  }
  table.conj td:last-child {
    font-family: var(--serif-body);
    font-style: italic;
    font-size: 17px;
    font-weight: 500;
  }
  table.conj td:last-child strong {
    background: linear-gradient(to bottom, transparent 60%, var(--highlight) 60%);
  }

  /* callouts */
  .callout {
    margin: 18px 0;
    padding: 14px 18px;
    border-radius: 2px;
    font-family: var(--jp);
    font-size: 14px;
    line-height: 1.7;
    position: relative;
  }
  .callout.warning {
    background: var(--warning-bg);
    border-left: 3px solid var(--warning-border);
    color: #5a2a1a;
  }
  .callout.tip {
    background: var(--good-bg);
    border-left: 3px solid var(--good-border);
    color: #2a3a1a;
  }
  .callout::before {
    font-family: var(--serif-display);
    font-style: italic;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
    opacity: 0.7;
  }
  .callout.warning::before { content: '⚠ Atenção'; color: var(--warning-border); }
  .callout.tip::before { content: '✦ Dica'; color: var(--good-border); }

  .callout .pt-inline { font-family: var(--serif-body); font-style: italic; font-size: 15px; color: var(--ink); }
  .callout .x { color: #a83a2a; font-weight: 600; }
  .callout .ok { color: #4a7a3a; font-weight: 600; }

  /* Mistake list */
  .mistake-row {
    padding: 12px 0;
    border-bottom: 1px dotted var(--rule);
    font-size: 14px;
  }
  .mistake-row:last-child { border: none; }
  .mistake-row .wrong, .mistake-row .right {
    font-family: var(--serif-body); font-style: italic; font-size: 16px;
    display: block; margin: 3px 0;
  }
  .mistake-row .wrong::before { content: '× '; color: #a83a2a; font-weight: 700; font-style: normal; }
  .mistake-row .right::before { content: '○ '; color: #4a7a3a; font-weight: 700; font-style: normal; }
  .mistake-row .reason {
    font-family: var(--jp); font-size: 12px; color: var(--ink-fade); margin-top: 4px;
    padding-left: 18px;
  }

  /* related tags */
  .related-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .related-tag {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--paper-deep);
    color: var(--azulejo);
    padding: 6px 10px;
    border: 1px solid var(--rule);
    cursor: pointer;
    transition: all 0.2s;
  }
  .related-tag:hover {
    background: var(--azulejo);
    color: var(--paper);
    border-color: var(--azulejo);
  }
  .related-tag.future {
    color: var(--ink-fade);
    cursor: default;
    font-style: italic;
  }
  .related-tag.future:hover {
    background: var(--paper-deep);
    color: var(--ink-fade);
    border-color: var(--rule);
  }

  /* Personal notes */
  .notes-area {
    margin-top: 16px;
  }
  .notes-textarea {
    width: 100%;
    min-height: 140px;
    padding: 16px;
    font-family: var(--jp);
    font-size: 15px;
    line-height: 1.7;
    background: var(--paper-deep);
    border: 1px dashed var(--rule);
    border-radius: 2px;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .notes-textarea:focus {
    border-style: solid;
    border-color: var(--terracotta);
  }
  .notes-meta {
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 11px;
    color: var(--ink-fade);
    margin-top: 6px;
    text-align: right;
    letter-spacing: 0.05em;
  }
  .notes-meta .saved-flash {
    color: var(--good-border);
    transition: opacity 0.4s;
  }

  /* Footer */
  footer {
    margin-top: 80px;
    padding: 32px 0;
    border-top: 1px double var(--rule);
    text-align: center;
    font-family: var(--serif-display);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-fade);
    letter-spacing: 0.06em;
  }
  footer .ornament {
    font-size: 18px;
    color: var(--gold);
    margin-bottom: 14px;
    letter-spacing: 0.4em;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    font-family: var(--jp);
    color: var(--ink-fade);
    font-size: 14px;
  }
  .no-results::before {
    content: '∅';
    display: block;
    font-size: 36px;
    color: var(--rule);
    margin-bottom: 12px;
  }

  /* Search highlight */
  mark {
    background: var(--highlight);
    color: var(--ink);
    padding: 0 2px;
  }

  /* Mobile */
  @media (max-width: 480px) {
    body { font-size: 17px; }
    .shell { padding: 0 18px; }
    header.masthead { padding: 36px 0 22px; }
    .tag-list .tag-name { font-size: 19px; }
    .tag-list .tag-pattern { font-size: 11px; }
    table { font-size: 13px; }
    th, td { padding: 8px 8px; }
    td.pt-cell { font-size: 15px; }
  }

  /* Selection */
  ::selection { background: var(--azulejo); color: var(--paper); }
</style>
</head>
<body>

<div class="shell">

  <header class="masthead">
    <div class="eyebrow">Caderno de Gramática</div>
    <h1>Português <em>Europeu</em></h1>
    <div class="sub">A1 〜 A2 学習者のための文法骨格集</div>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="タグ・パターン・例文・日本語で検索…">
  </div>

  <!-- HOME: Tag index -->
  <main id="home" class="tag-index">
    <h2 class="index-title">— Índice —</h2>
    <ol class="tag-list" id="tagList"></ol>
    <div class="no-results" id="noResults" style="display:none;">該当するタグが見つかりません</div>
  </main>

  <!-- Note detail view -->
  <article id="noteView" class="note-view"></article>

  <footer>
    <div class="ornament">❦ · ❦ · ❦</div>
    Caderno · A1→A2 · 携帯端末でホーム画面に追加して使用可<br>
    メモはこの端末のブラウザに自動保存されます
  </footer>

</div>

<script>
/* ============================================================
   DATA — All grammar notes embedded
   ============================================================ */
const NOTES = [
  {
    id: 'ir_a_lugar_com_objeto',
    name: 'ir a + lugar + com + objeto',
    pattern: 'ir a + [lugar] + com + [objeto]',
    theme: '移動動詞・縮約 ao/à',
    source: 'O menino e o pato',
    sections: [
      { type: 'lead', text: '「[誰々]が[何々]を持って[どこそこ]へ行く」' },
      { type: 'h3', text: '例文' },
      { type: 'example', pt: 'Um menino vai <strong>ao</strong> parque <strong>com</strong> um pão.', jp: '男の子がパンを持って公園へ行く。', source: 'Shorty「O menino e o pato」' },
      { type: 'example', pt: 'Vou <strong>à</strong> farmácia <strong>com</strong> a receita.', jp: '処方箋を持って薬局に行く。' },
      { type: 'example', pt: 'Nós vamos <strong>à</strong> praia <strong>com</strong> uma toalha.', jp: '私たちはタオルを持ってビーチへ行く。' },

      { type: 'h3', text: 'ポイント解説' },
      { type: 'h4', num: '1', text: 'ir a vs ir para' },
      { type: 'p', text: '<b>ir a</b> … 短期的な訪問・往復を前提（その場所に行ってまた戻る）<br><span class="pt">Vou ao supermercado.</span>（スーパーに行く＝買い物してすぐ戻る）' },
      { type: 'p', text: '<b>ir para</b> … より長期的・恒久的な移動<br><span class="pt">Vou para casa.</span>（家に帰る＝そこに留まる）<br><span class="pt">Vou para o Brasil no próximo ano.</span>（来年ブラジルに引っ越す）' },
      { type: 'tip', text: 'A1-A2では「日常的な外出」はほぼすべて <span class="pt-inline">ir a</span> で表現できると覚えてOK。' },

      { type: 'h4', num: '2', text: '縮約 (contração) の必須対応表' },
      { type: 'table', headers: ['前置詞 + 冠詞', '縮約形', '例'], rows: [
        ['a + o', '<span class="hl">ao</span>', 'ir <span class="hl">ao</span> parque'],
        ['a + a', '<span class="hl">à</span>', 'ir <span class="hl">à</span> escola'],
        ['a + os', '<span class="hl">aos</span>', 'ir <span class="hl">aos</span> correios'],
        ['a + as', '<span class="hl">às</span>', 'ir <span class="hl">às</span> compras'],
      ]},
      { type: 'warning', text: '<b>a + a = à</b> のアクセント記号（クラーゼ acento grave）を忘れない こと。書き言葉でも話し言葉でも区別が必要。' },

      { type: 'h4', num: '3', text: 'com の使い方' },
      { type: 'p', text: '<span class="pt">com + [objeto]</span> で「〜を持って／〜と一緒に」。冠詞は基本的に必要（<span class="pt">com um pão</span>, <span class="pt">com a mochila</span>）。<br><span class="pt">com</span> は他の前置詞のような縮約はしない（<span class="pt">com o</span>, <span class="pt">com a</span> のまま）。' },

      { type: 'h3', text: '動詞 ir の現在形活用' },

/* ============================================================
   RENDERING
   ============================================================ */

const tagListEl = document.getElementById('tagList');
const noteViewEl = document.getElementById('noteView');
const homeEl = document.getElementById('home');
const noResultsEl = document.getElementById('noResults');
const searchInput = document.getElementById('searchInput');

function renderTagList(filter = '') {
  const f = filter.toLowerCase().trim();
  let visible = 0;
  tagListEl.innerHTML = '';

  NOTES.forEach((note, idx) => {
    // Build searchable text
    const haystack = [
      note.id, note.name, note.pattern, note.theme, note.source,
      ...note.sections.flatMap(s => Object.values(s).filter(v => typeof v === 'string'))
    ].join(' ').toLowerCase();

    if (f && !haystack.includes(f)) return;
    visible++;

    const hasNote = !!localStorage.getItem(`pt_note__${note.id}`);

    const li = document.createElement('li');
    li.innerHTML = `
      <div class="tag-content">
        <div class="tag-name">${highlight(note.name, f)}${hasNote ? '<span class="has-note-dot" title="メモあり"></span>' : ''}</div>
        <div class="tag-pattern">${highlight(note.pattern, f)}</div>
        <div class="tag-theme">${highlight(note.theme, f)}</div>
      </div>
      <span class="tag-arrow">→</span>
    `;
    li.addEventListener('click', () => openNote(note.id));
    tagListEl.appendChild(li);
  });

  noResultsEl.style.display = visible === 0 ? 'block' : 'none';
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${escapeReg(q)})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}
function escapeReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function openNote(id) {
  const note = NOTES.find(n => n.id === id);
  if (!note) return;

  homeEl.style.display = 'none';
  document.querySelector('.search-wrap').style.display = 'none';
  noteViewEl.classList.add('active');
  noteViewEl.innerHTML = renderNote(note);
  bindNoteHandlers(note);
  window.scrollTo(0, 0);
  history.replaceState(null, '', `#${id}`);
}

function closeNote() {
  homeEl.style.display = '';
  document.querySelector('.search-wrap').style.display = '';
  noteViewEl.classList.remove('active');
  noteViewEl.innerHTML = '';
  window.scrollTo(0, 0);
  history.replaceState(null, '', window.location.pathname);
  // refresh dots
  renderTagList(searchInput.value);
}

function renderNote(note) {
  const sectionsHtml = note.sections.map(renderSection).join('');
  return `
    <button class="back-link" onclick="closeNote()">← Índice に戻る</button>
    <h1>#${note.id}</h1>
    <h2>${note.name}</h2>
    ${sectionsHtml}

    <h3>追加メモ</h3>
    <div class="notes-area">
      <textarea class="notes-textarea" id="notes_${note.id}" placeholder="このタグについて気づいたこと、ネイティブから聞いた表現、混同しやすい点などを自由に書き留めてください…"></textarea>
      <div class="notes-meta" id="meta_${note.id}">未保存</div>
    </div>
  `;
}

function renderSection(s) {
  switch (s.type) {
    case 'lead': return `<p class="lead">${s.text}</p>`;
    case 'h3': return `<h3>${s.text}</h3>`;
    case 'h4': return `<h4>${s.num ? `<span class="num">${s.num}.</span>` : ''}${s.text}</h4>`;
    case 'p': return `<p>${s.text}</p>`;
    case 'example':
      return `<div class="example">
        <div class="pt-line">${s.pt}</div>
        ${s.jp ? `<div class="jp-line">${s.jp}</div>` : ''}
        ${s.source ? `<div class="source">— ${s.source}</div>` : ''}
      </div>`;
    case 'table': {
      const head = s.headers.map(h => `<th>${h}</th>`).join('');
      const body = s.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
      return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }
    case 'conj': {
      const body = s.rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
      return `<table class="conj"><tbody>${body}</tbody></table>`;
    }
    case 'warning': return `<div class="callout warning">${s.text}</div>`;
    case 'tip': return `<div class="callout tip">${s.text}</div>`;
    case 'mistake':
      return `<div class="mistake-row">
        <span class="wrong">${s.wrong}</span>
        <span class="right">${s.right}</span>
        ${s.reason ? `<div class="reason">— ${s.reason}</div>` : ''}
      </div>`;
    case 'related': {
      const tags = s.tags.map(t => {
        if (t.future) return `<span class="related-tag future">${t.label}</span>`;
        return `<span class="related-tag" data-id="${t.id}">${t.label}</span>`;
      }).join('');
      return `<div class="related-tags">${tags}</div>`;
    }
    default: return '';
  }
}

function bindNoteHandlers(note) {
  // Related tag click
  noteViewEl.querySelectorAll('.related-tag[data-id]').forEach(el => {
    el.addEventListener('click', () => openNote(el.dataset.id));
  });

  // Notes load + autosave
  const ta = document.getElementById(`notes_${note.id}`);
  const meta = document.getElementById(`meta_${note.id}`);
  const key = `pt_note__${note.id}`;
  const stored = localStorage.getItem(key);
  if (stored) {
    try {
      const obj = JSON.parse(stored);
      ta.value = obj.text || '';
      meta.textContent = obj.savedAt ? `最終保存: ${formatDate(obj.savedAt)}` : '';
    } catch {
      ta.value = stored;
    }
  }

  let saveTimer;
  ta.addEventListener('input', () => {
    clearTimeout(saveTimer);
    meta.textContent = '入力中…';
    saveTimer = setTimeout(() => {
      const obj = { text: ta.value, savedAt: Date.now() };
      localStorage.setItem(key, JSON.stringify(obj));
      meta.innerHTML = `<span class="saved-flash">✓ 保存しました</span> · ${formatDate(obj.savedAt)}`;
      setTimeout(() => {
        meta.textContent = `最終保存: ${formatDate(obj.savedAt)}`;
      }, 1400);
    }, 500);
  });
}

function formatDate(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/* ============================================================
   INIT
   ============================================================ */
searchInput.addEventListener('input', e => renderTagList(e.target.value));
renderTagList();

// Deep-link on load
const initialHash = window.location.hash.slice(1);
if (initialHash && NOTES.find(n => n.id === initialHash)) {
  openNote(initialHash);
}

// Browser back support
window.addEventListener('popstate', () => {
  const h = window.location.hash.slice(1);
  if (h && NOTES.find(n => n.id === h)) {
    openNote(h);
  } else {
    closeNote();
  }
});
</script>
